name: Go tests
on: [push]
permissions:
  contents: read
jobs:

  build:
    name: Test
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: ^1.26
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Build & test
      run: make go-test
